<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Space Debris Portal{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        .navbar {
            background-color: #1a1a1a;
            padding: 1rem;
            display: flex;
            justify-content: center;
            box-shadow: 0 2px 10px rgba(0, 255, 255, 0.5);
        }
        .navbar a {
            color: #00ffff;
            text-decoration: none;
            margin: 0 1rem;
            font-weight: bold;
            transition: color 0.3s;
        }
        .navbar a:hover {
            color: #ffffff;
            text-shadow: 0 0 10px #00ffff;
        }
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .card {
            background-color: #1a1a1a;
            border: 1px solid #00ffff;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            transition: box-shadow 0.3s;
        }
        .card:hover {
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        .summary-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .summary-card {
            flex: 1;
            min-width: 200px;
            text-align: center;
        }
        .chart-container {
            position: relative;
            height: 400px;
            margin: 2rem 0;
        }
        .upload-form {
            background-color: #1a1a1a;
            border: 1px solid #00ffff;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 2rem;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        .upload-form input[type="file"] {
            margin: 0.5rem 0;
        }
        .upload-form button {
            background-color: #00ffff;
            color: #0d0d0d;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .upload-form button:hover {
            background-color: #ffffff;
        }
        .message {
            color: #00ff00;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .error {
            color: #ff0000;
            font-weight: bold;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'analysis' %}">Analysis</a>
        <a href="{% url 'mongodb' %}">MongoDB Demo</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
